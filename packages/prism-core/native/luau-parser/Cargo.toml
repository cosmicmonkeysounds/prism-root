[package]
name = "prism-luau-parser"
version = "0.1.0"
edition = "2021"
description = "Lossless Luau parser for Prism — wraps Kampfkarren/full-moon, compiles to WASM via wasm-bindgen, consumed by @prism/core's syntax/luau/ LanguageDefinition."

[lib]
# `cdylib` is the wasm-bindgen linkage path — produces a `.wasm` the
# wasm-bindgen CLI can wrap with JS glue. `rlib` keeps native `cargo test`
# working so we can unit-test the parse helpers without firing up a
# browser harness.
crate-type = ["cdylib", "rlib"]

[dependencies]
# Lossless Luau/Lua AST — used by Selene and StyLua. The `luau` feature
# enables Luau-specific syntax (type annotations, string interpolation,
# continue, compound assignment, etc.).
full_moon = { version = "1.2", features = ["luau"] }

# Rust ↔ JS bridge. Works on wasm32-unknown-unknown (full-moon has no
# C deps, so we don't need the emscripten toolchain the daemon uses).
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"

[profile.release]
# Optimize for size — this ships as a browser-loaded .wasm blob.
opt-level = "z"
lto = true
codegen-units = 1
