// Gradle module for the Prism daemon Capacitor plugin (Android side).
//
// This module packages:
//   - PrismDaemonPlugin.kt   — Kotlin CAPPlugin wrapping the C ABI
//   - jniLibs/<abi>/libprism_daemon.so — the Rust staticlib linked
//     into a shared object via `cargo ndk` (one per ABI)
//
// The jniLibs are produced by `packages/prism-daemon/scripts/build-android.sh`
// and staged into `android/src/main/jniLibs/` before the plugin is
// consumed by the Studio app's Android project.

ext {
    capacitorVersion = project.hasProperty('capacitorVersion') ? rootProject.ext.capacitorVersion : '7.0.0'
    junitVersion = project.hasProperty('junitVersion') ? rootProject.ext.junitVersion : '4.13.2'
    androidxAppCompatVersion = project.hasProperty('androidxAppCompatVersion') ? rootProject.ext.androidxAppCompatVersion : '1.7.0'
    androidxJunitVersion = project.hasProperty('androidxJunitVersion') ? rootProject.ext.androidxJunitVersion : '1.2.1'
    androidxEspressoCoreVersion = project.hasProperty('androidxEspressoCoreVersion') ? rootProject.ext.androidxEspressoCoreVersion : '3.6.1'
}

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.7.2'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.25'
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace "com.prism.daemon"
    compileSdk 35
    defaultConfig {
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "0.1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        // The four ABIs we produce .so files for. Must match the
        // `cargo ndk --target` list in scripts/build-android.sh.
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    sourceSets {
        main {
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation project(':capacitor-android')
    // JNA is how the Kotlin plugin calls into libprism_daemon.so
    // without a JNI shim — see PrismDaemonPlugin.kt for the rationale.
    // We pull the `@aar` variant because JNA's Android .aar bundles
    // the per-ABI `libjnidispatch.so` files alongside the Java API.
    implementation "net.java.dev.jna:jna:5.14.0@aar"
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
}
