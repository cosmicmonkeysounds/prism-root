# Federation mesh — two relays that discover each other.
# Usage:
#   docker compose -f docker-compose.federation.yml up --build
#
# Relay A runs on port 4444, Relay B on port 4445.
# Both announce to each other on startup via bootstrap peers.

services:
  relay-a:
    build:
      context: ../..
      dockerfile: packages/prism-relay/Dockerfile
    ports:
      - "4444:4444"
    volumes:
      - relay-a-data:/home/prism/.prism/relay
    environment:
      PRISM_RELAY_MODE: server
      PRISM_RELAY_HOST: "0.0.0.0"
      PRISM_RELAY_PORT: "4444"
      PRISM_RELAY_PUBLIC_URL: "http://relay-a:4444"
      PRISM_RELAY_LOG_LEVEL: info
    networks:
      - prism-federation
    restart: unless-stopped

  relay-b:
    build:
      context: ../..
      dockerfile: packages/prism-relay/Dockerfile
    ports:
      - "4445:4444"
    volumes:
      - relay-b-data:/home/prism/.prism/relay
    environment:
      PRISM_RELAY_MODE: server
      PRISM_RELAY_HOST: "0.0.0.0"
      PRISM_RELAY_PORT: "4444"
      PRISM_RELAY_PUBLIC_URL: "http://relay-b:4444"
      PRISM_RELAY_LOG_LEVEL: info
    networks:
      - prism-federation
    depends_on:
      relay-a:
        condition: service_healthy
    restart: unless-stopped

networks:
  prism-federation:
    driver: bridge

volumes:
  relay-a-data:
  relay-b-data:
