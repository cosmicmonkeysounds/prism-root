<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prism Studio</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0f1218;
        color: #e8ecf4;
        overflow: hidden;
        font-family:
          ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          sans-serif;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <!--
      The Slint winit backend (wasm32-unknown-unknown) locates the
      canvas by id. `prism-shell`'s wasm-bindgen `(start)` entry
      point constructs an `AppWindow` and runs the event loop into
      this canvas.
    -->
    <canvas id="canvas"></canvas>
    <script type="module">
      import init from "./prism_shell.js";
      init();
    </script>
  </body>
</html>
