# Trunk config for the WASM build of prism-shell.
#
#   trunk serve --config packages/prism-shell/Trunk.toml
#   trunk build --release --config packages/prism-shell/Trunk.toml
#
# Trunk reads the crate's `cdylib` target and ships the `.wasm` +
# bindings generated by wasm-bindgen alongside the sibling
# `index.html` shim. The shim hosts a <canvas> element that the
# `src/web.rs` entry attaches to.

[build]
target = "index.html"
release = false
dist = "dist"

[serve]
address = "127.0.0.1"
port = 1420
open = false
