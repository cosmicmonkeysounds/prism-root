services:
  relay:
    build:
      context: ../..
      dockerfile: packages/prism-relay/Dockerfile
    ports:
      - "4444:4444"
    volumes:
      - relay-data:/home/prism/.prism/relay
    environment:
      PRISM_RELAY_MODE: server
      PRISM_RELAY_HOST: "0.0.0.0"
      PRISM_RELAY_PORT: "4444"
      PRISM_RELAY_LOG_LEVEL: info
    restart: unless-stopped

volumes:
  relay-data:
