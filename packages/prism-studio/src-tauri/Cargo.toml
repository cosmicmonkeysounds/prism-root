[package]
name = "prism-studio"
version = "0.1.0"
edition = "2021"
description = "Prism Studio — the packaged desktop shell. Pure tao + wgpu + prism-shell; packaging goes through cargo-packager in Phase 5. No Tauri, no wry, no webview in the dep tree."

[[bin]]
name = "prism-studio"
path = "src/main.rs"

[dependencies]
# Shared types and the UI tree we render. The `clay` feature brings
# in `clay-layout` so we can drive the same render path as the
# `prism-shell` dev binary.
prism-shell = { path = "../../prism-shell", default-features = false, features = ["native", "clay"] }
prism-core = { path = "../../prism-core" }

# Render loop deps — mirror what `prism-shell`'s native bin uses so
# the Studio host can drive the same `GraphicsContext` + `UiRenderer`
# + `Clay` triple that the dev bin does. `tao` is the only windowing
# crate in the tree now that Tauri is gone; Phase 0 spike #5 was
# retried 2026-04-15 and Option C (standalone shell crates) was
# adopted. The packaged desktop bundle goes through `cargo-packager`
# in Phase 5 — no `tauri` / `wry` / `tauri-runtime-wry` anywhere.
clay-layout = { workspace = true }
tao = { workspace = true }
raw-window-handle = "0.6"

# Daemon runs as a sidecar process — Studio does not link it as a
# library. The `prism-daemon` crate is kept on the path so a dev
# build can spawn the in-tree binary without a packaging step. We
# enable `transport-ipc` so the wire types (`IpcRequest` /
# `IpcResponse`) and the `serve_blocking` / `connect_client` helpers
# are shared with the sidecar end.
prism-daemon = { path = "../../prism-daemon", default-features = false, features = ["full", "transport-ipc"] }

# Local IPC transport for the sidecar channel (unix sockets / named
# pipes behind one trait). Length-prefixed `postcard` frames ride on
# top, matching the §4.5 decision. Workspace-pinned so the daemon
# and the studio client stay on the same interprocess major.
interprocess = { workspace = true }
postcard = { workspace = true }

# Shared.
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
