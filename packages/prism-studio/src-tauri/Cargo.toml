[package]
name = "prism-studio"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "Prism Studio — the packaged desktop shell. Thin Slint host that owns the daemon sidecar; Slint owns windowing, layout, and rendering. Packaging goes through cargo-packager in Phase 5."

[[bin]]
name = "prism-studio"
path = "src/main.rs"

[dependencies]
# Shared types and the UI tree we render. Studio embeds the shell
# as a library and drives the same `Shell::run()` entry point the
# standalone dev binary does.
prism-shell = { path = "../../prism-shell", default-features = false, features = ["native"] }
prism-core = { path = "../../prism-core" }

# Slint is pulled in so Studio can reach through to
# `slint::PlatformError` when reporting boot failures. The shell
# library already owns the actual event loop.
slint = { workspace = true }

# Daemon runs as a sidecar process — Studio does not link it as a
# library. The `prism-daemon` crate is kept on the path so a dev
# build can spawn the in-tree binary without a packaging step. We
# enable `transport-ipc` so the wire types (`IpcRequest` /
# `IpcResponse`) and the `serve_blocking` / `connect_client` helpers
# are shared with the sidecar end.
prism-daemon = { path = "../../prism-daemon", default-features = false, features = ["full", "transport-ipc"] }

# Local IPC transport for the sidecar channel (unix sockets / named
# pipes behind one trait). Length-prefixed `postcard` frames ride on
# top, matching the §4.5 decision. Workspace-pinned so the daemon
# and the studio client stay on the same interprocess major.
interprocess = { workspace = true }
postcard = { workspace = true }

# Shared.
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
