[package]
name = "prism-builder"
version = "0.1.0"
edition = "2021"
description = "Prism page builder — Clay-native replacement for Puck. Owns the component registry, drag/drop, selection, property panel, and serialization. Phase 3 target of the Clay migration plan."

[lib]
name = "prism_builder"
path = "src/lib.rs"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
indexmap = { workspace = true }
slotmap = { workspace = true }
prism-core = { path = "../prism-core" }

[dev-dependencies]
insta = { workspace = true }
