[package]
name = "prism-builder"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "Prism page builder — Slint-native replacement for Puck. Owns the component registry, drag/drop, selection, property panel, and serialization. Phase 3 target of the Slint migration plan."

[lib]
name = "prism_builder"
path = "src/lib.rs"

[features]
default = []
# `interpreter` pulls in `slint-interpreter` + a tiny blocking executor so
# host crates that want the live Studio render path can call
# `render::compile_slint_source` / `render::instantiate_document`. Pure
# source emission (`render_document_slint_source`) is always available —
# the feature only gates the runtime compilation half. `prism-relay`
# leaves it off so its dep graph stays free of Slint entirely; `prism-shell`
# flips it on so Studio's builder panel can materialise live components.
interpreter = ["dep:slint", "dep:slint-interpreter", "dep:spin_on"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
indexmap = { workspace = true }
slotmap = { workspace = true }
glam = { workspace = true }
taffy = { workspace = true }
prism-core = { path = "../prism-core" }

# Optional — gated behind the `interpreter` feature so downstream crates
# that only want the DSL text don't pay for the full Slint compiler.
slint = { workspace = true, optional = true }
slint-interpreter = { workspace = true, optional = true }
spin_on = { workspace = true, optional = true }

[dev-dependencies]
insta = { workspace = true }
