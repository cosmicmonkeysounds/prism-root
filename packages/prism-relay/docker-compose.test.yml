# Test-specific Docker Compose — ephemeral ports, no restart, fast health checks.
# Usage (from tests or manual):
#   docker compose -f docker-compose.test.yml -p prism-e2e up --build -d
#   docker compose -f docker-compose.test.yml -p prism-e2e down --volumes

services:
  # ── Single relay (server mode) ──────────────────────────────────────────
  relay:
    build:
      context: ../..
      dockerfile: packages/prism-relay/Dockerfile
    ports:
      - "0:4444"
    tmpfs:
      - /home/prism/.prism/relay
    environment:
      PRISM_RELAY_MODE: server
      PRISM_RELAY_HOST: "0.0.0.0"
      PRISM_RELAY_PORT: "4444"
      PRISM_RELAY_LOG_LEVEL: info
    restart: "no"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4444/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 10
    profiles:
      - single

  # ── Persistence relay (named volume for restart tests) ──────────────────
  relay-persist:
    build:
      context: ../..
      dockerfile: packages/prism-relay/Dockerfile
    ports:
      - "0:4444"
    volumes:
      - persist-data:/home/prism/.prism/relay
    environment:
      PRISM_RELAY_MODE: server
      PRISM_RELAY_HOST: "0.0.0.0"
      PRISM_RELAY_PORT: "4444"
      PRISM_RELAY_LOG_LEVEL: info
    restart: "no"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4444/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 10
    profiles:
      - persist

  # ── Dev mode relay ──────────────────────────────────────────────────────
  relay-dev:
    build:
      context: ../..
      dockerfile: packages/prism-relay/Dockerfile
    ports:
      - "0:4444"
    tmpfs:
      - /home/prism/.prism/relay
    environment:
      PRISM_RELAY_MODE: dev
      PRISM_RELAY_HOST: "0.0.0.0"
      PRISM_RELAY_PORT: "4444"
      PRISM_RELAY_LOG_LEVEL: debug
    restart: "no"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4444/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 10
    profiles:
      - dev

  # ── Federation mesh ─────────────────────────────────────────────────────
  relay-a:
    build:
      context: ../..
      dockerfile: packages/prism-relay/Dockerfile
    ports:
      - "0:4444"
    tmpfs:
      - /home/prism/.prism/relay
    environment:
      PRISM_RELAY_MODE: server
      PRISM_RELAY_HOST: "0.0.0.0"
      PRISM_RELAY_PORT: "4444"
      PRISM_RELAY_PUBLIC_URL: "http://relay-a:4444"
      PRISM_RELAY_LOG_LEVEL: info
    networks:
      - federation
    restart: "no"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4444/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 10
    profiles:
      - federation

  relay-b:
    build:
      context: ../..
      dockerfile: packages/prism-relay/Dockerfile
    ports:
      - "0:4444"
    tmpfs:
      - /home/prism/.prism/relay
    environment:
      PRISM_RELAY_MODE: server
      PRISM_RELAY_HOST: "0.0.0.0"
      PRISM_RELAY_PORT: "4444"
      PRISM_RELAY_PUBLIC_URL: "http://relay-b:4444"
      PRISM_RELAY_LOG_LEVEL: info
    networks:
      - federation
    depends_on:
      relay-a:
        condition: service_healthy
    restart: "no"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4444/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 10
    profiles:
      - federation

networks:
  federation:
    driver: bridge

volumes:
  persist-data:
