[package]
name = "prism-studio"
version = "0.1.0"
edition = "2021"
description = "Prism Studio — the packaged desktop shell. Tauri 2 app shell (packaging, signing, auto-update, sidecars) with wry DISABLED per Clay migration §4.5. Windowing via tao, rendering via wgpu, UI tree via prism-shell, kernel via prism-daemon as a sidecar over interprocess."

[[bin]]
name = "prism-studio"
path = "src/main.rs"

[dependencies]
# Tauri 2 — packaging, updater, signing, sidecars. The `wry` feature
# stays on because `tauri::Builder<R>` needs a `Runtime` impl and
# `tauri-runtime-wry` is the only one that ships with Tauri today —
# but per §4.5 Option B (resolved 2026-04-14 by spike #5) we never
# create a `WebviewWindow`. Instead the `unstable` feature exposes
# `tauri::window::WindowBuilder`, which builds a pure `tao::Window`
# with no webview attached; `prism-shell` owns the event loop body
# and renders directly into its surface via wgpu. The webview code
# path is compiled in but never executed.
tauri = { workspace = true, features = ["wry", "unstable"] }
tauri-build = { workspace = true }

# Shared types and the UI tree we render. The `clay` feature brings
# in `clay-layout` so we can drive the same render path as the
# `prism-shell` dev binary.
prism-shell = { path = "../../prism-shell", default-features = false, features = ["native", "clay"] }
prism-core = { path = "../../prism-core" }

# Render loop deps — mirror what `prism-shell`'s native bin uses so
# the Studio host can drive the same `GraphicsContext` + `UiRenderer`
# + `Clay` triple that the dev bin does.
clay-layout = { workspace = true }
raw-window-handle = "0.6"

# Daemon is a sidecar process managed by Tauri — Studio does not
# link it as a library any more. The `prism-daemon` crate is kept
# on the path so a dev build can spawn the in-tree binary without a
# packaging step. We enable `transport-ipc` so the wire types
# (`IpcRequest` / `IpcResponse`) and the `serve_blocking` /
# `connect_client` helpers are shared with the sidecar end.
prism-daemon = { path = "../../prism-daemon", default-features = false, features = ["full", "transport-ipc"] }

# Local IPC transport for the sidecar channel (unix sockets / named
# pipes behind one trait). Length-prefixed `postcard` frames ride on
# top, matching the §4.5 decision. Workspace-pinned so the daemon
# and the studio client stay on the same interprocess major.
interprocess = { workspace = true }
postcard = { workspace = true }

# Shared.
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }

[build-dependencies]
tauri-build = { workspace = true }
