# Emscripten link arguments for the browser build of prism-shell.
#
# Consulted only when cargo builds for `wasm32-unknown-emscripten`;
# every other target (the native `prism-shell` dev bin, the Studio
# embed via rlib) links as normal.
#
# Mirrors `packages/prism-daemon/.cargo/config.toml` — same factory
# shape, same runtime method exports, same memory story. The only
# differences are:
#
# - `EXPORTED_FUNCTIONS` lists the `prism_shell_*` symbols from
#   `src/web.rs` instead of the daemon's `prism_daemon_*` surface.
# - `EXPORT_NAME` is `createPrismShell` so a page can load both the
#   daemon and the shell side-by-side without their default factories
#   clobbering each other.
# - `-sSUPPORT_LONGJMP=wasm` + `-sERROR_ON_UNDEFINED_SYMBOLS=0` stay
#   because transitively we still pull in crates (clay-layout's C
#   core, cosmic-text's zeroize trampoline) whose exception / unwind
#   ABI needs to line up with rustc's unconditional
#   `-fwasm-exceptions` on emscripten.
#
# See the daemon config for the full per-flag rationale; everything
# here serves the same purpose.

[target.wasm32-unknown-emscripten]
rustflags = [
    "-C", "link-arg=-sMODULARIZE=1",
    "-C", "link-arg=-sEXPORT_ES6=1",
    "-C", "link-arg=-sEXPORT_NAME=createPrismShell",
    "-C", "link-arg=-sEXPORTED_FUNCTIONS=_prism_shell_boot,_prism_shell_shutdown,_prism_shell_resize,_prism_shell_pointer_move,_prism_shell_pointer_button,_prism_shell_wheel,_prism_shell_key,_prism_shell_frame,_prism_shell_frame_len,_malloc,_free",
    "-C", "link-arg=-sEXPORTED_RUNTIME_METHODS=ccall,cwrap,UTF8ToString,HEAPU8,HEAPU32,HEAPF32",
    "-C", "link-arg=-sALLOW_MEMORY_GROWTH=1",
    "-C", "link-arg=-sINITIAL_MEMORY=16777216",
    "-C", "link-arg=-sSTACK_SIZE=1048576",
    "-C", "link-arg=-sENVIRONMENT=web,worker",
    "-C", "link-arg=-sINVOKE_RUN=0",
    "-C", "link-arg=-sSUPPORT_LONGJMP=wasm",
    "-C", "link-arg=-sERROR_ON_UNDEFINED_SYMBOLS=0",
]
