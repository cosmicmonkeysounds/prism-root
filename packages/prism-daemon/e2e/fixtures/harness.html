<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>prism-daemon WASM harness</title>
</head>
<body>
    <h1>prism-daemon WASM harness</h1>
    <p id="status">Loading emscripten module…</p>
    <pre id="log"></pre>

    <!--
        Browser test harness for the prism-daemon emscripten build.

        Playwright navigates to /harness.html, waits on
        `window.__prismDaemonReady`, then drives the exposed `api` object
        through `page.evaluate`. Every DaemonKernel the test suite touches
        flows through this thin JS shim — it's deliberately the only glue
        between the C ABI exported from Rust and the assertions we make
        from Node.

        Keep this file dependency-free. It's loaded from a plain static
        server (see e2e/server.mjs), not from a bundler. No imports beyond
        the emscripten-generated `./prism_daemon_wasm.js`. We import the
        glue under its native `prism_daemon_wasm` name because the `.js`
        hardcodes the companion `.wasm` filename at build time — renaming
        either half breaks the `fetch()` inside emscripten's module
        factory.
    -->
    <script type="module">
        import createPrismDaemon from "./prism_daemon_wasm.js";

        const statusEl = document.getElementById("status");
        const logEl = document.getElementById("log");
        const write = (line) => {
            logEl.textContent += line + "\n";
        };

        const ready = (async () => {
            const Module = await createPrismDaemon({
                // Route emscripten logging into the page so
                // Playwright's `page.on('console')` can tail it.
                print: (msg) => write("[stdout] " + msg),
                printErr: (msg) => write("[stderr] " + msg),

                // loro-internal 1.10 transitively pulls in wasm-bindgen
                // even when their `wasm` feature is off (a Cargo.toml
                // bug: `not(features = "wasm")` — plural — is always
                // true). The compiled wasm imports from the
                // `__wbindgen_placeholder__` module, which only
                // wasm-bindgen's JS glue provides. Since we use
                // emscripten (not wasm-pack/wasm-bindgen), the module
                // is absent and instantiation fails. We intercept
                // instantiation to inject no-op stubs so the dead-code
                // imports resolve without pulling in wasm-bindgen's
                // runtime. None of these stubs are ever called — they
                // exist solely to satisfy WebAssembly.instantiate.
                instantiateWasm(imports, receiveInstance) {
                    // loro-internal 1.10 pulls wasm-bindgen into the
                    // binary unconditionally for wasm32 (a Cargo.toml
                    // typo: `not(features = "wasm")` — note the 's').
                    // The compiled wasm therefore imports from the
                    // `__wbindgen_placeholder__` module (dev builds) or
                    // a minified single-letter module (prod builds with
                    // -O3). These imports are dead code — nothing in
                    // our stack calls them — but WebAssembly.instantiate
                    // requires every declared import to be satisfied.
                    //
                    // Strategy: fetch the wasm bytes, compile the module
                    // to discover its import list, then fill any gap
                    // between what emscripten provides and what the wasm
                    // declares with no-op stubs before instantiating.
                    (async () => {
                        const resp = await fetch("prism_daemon_wasm.wasm");
                        const bytes = await resp.arrayBuffer();
                        const compiled = await WebAssembly.compile(bytes);
                        const declared = WebAssembly.Module.imports(compiled);

                        // Collect every {module, name} the wasm wants.
                        const needed = new Map();
                        for (const imp of declared) {
                            if (!needed.has(imp.module)) {
                                needed.set(imp.module, new Set());
                            }
                            needed.get(imp.module).add(imp.name);
                        }

                        // Ensure every module exists in `imports`, then
                        // fill missing names with no-op stubs.
                        for (const [mod, names] of needed) {
                            if (!imports[mod]) {
                                imports[mod] = {};
                            }
                            for (const name of names) {
                                if (!(name in imports[mod])) {
                                    imports[mod][name] = () => 0;
                                }
                            }
                        }

                        const instance = await WebAssembly.instantiate(
                            compiled,
                            imports,
                        );
                        receiveInstance(instance, compiled);
                    })().catch((err) => {
                        write("[harness] wasm instantiation failed: " + err);
                        throw err;
                    });
                    return {};
                },
            });

            // `cwrap` pre-binds the C signature for repeat calls — cheaper
            // than going through `ccall` each time.
            const rawInvoke = Module.cwrap(
                "prism_daemon_invoke",
                "number",
                ["number", "string", "string"],
            );
            const rawFreeString = Module.cwrap(
                "prism_daemon_free_string",
                null,
                ["number"],
            );
            const rawCreate = Module.cwrap(
                "prism_daemon_create",
                "number",
                [],
            );
            const rawDestroy = Module.cwrap(
                "prism_daemon_destroy",
                null,
                ["number"],
            );

            /**
             * Higher-level API: one call, returns the decoded response,
             * frees the C string for you. Every test that isn't explicitly
             * checking memory lifetime should go through this path.
             */
            const invoke = (kernel, name, payload) => {
                const payloadJson = JSON.stringify(payload ?? null);
                const ptr = rawInvoke(kernel, name, payloadJson);
                if (ptr === 0) {
                    throw new Error(
                        "prism_daemon_invoke returned null pointer",
                    );
                }
                try {
                    const json = Module.UTF8ToString(ptr);
                    return JSON.parse(json);
                } finally {
                    rawFreeString(ptr);
                }
            };

            window.__prismDaemon = {
                Module,
                createKernel: () => {
                    const k = rawCreate();
                    if (k === 0) {
                        throw new Error(
                            "prism_daemon_create returned null pointer",
                        );
                    }
                    return k;
                },
                destroyKernel: rawDestroy,
                invoke,
                // Exposed for tests that need to verify the raw pointer
                // ownership contract (null/free dance).
                raw: {
                    invoke: rawInvoke,
                    freeString: rawFreeString,
                    create: rawCreate,
                    destroy: rawDestroy,
                    UTF8ToString: (ptr) => Module.UTF8ToString(ptr),
                },
            };

            statusEl.textContent = "prism-daemon ready";
            write("[harness] module initialized");
        })();

        // Playwright waits on this promise.
        window.__prismDaemonReady = ready.catch((err) => {
            statusEl.textContent = "failed: " + err.message;
            write("[harness] fatal: " + err.stack);
            // Re-throw so `waitForFunction(() => __prismDaemon)` never
            // satisfies, and Playwright times out with a clear error.
            throw err;
        });
    </script>
</body>
</html>
