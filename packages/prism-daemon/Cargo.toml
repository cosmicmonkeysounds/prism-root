[package]
name = "prism-daemon"
version = "0.1.0"
edition = "2021"
description = "Prism Daemon — the local physics engine. Cross-platform kernel with pluggable modules (CRDT, Luau, build, watcher) assembled via a fluent builder, transport-agnostic so it can be embedded behind Tauri, a mobile FFI, a CLI, or an HTTP adapter."

[lib]
name = "prism_daemon"
path = "src/lib.rs"
# `rlib` is the Rust-native linkage path (Tauri, tests, the CLI bin, the
# wasm `prism_daemon_wasm` bin stub). We intentionally do NOT emit a
# `cdylib` here: on `wasm32-unknown-emscripten`, a cdylib triggers a
# second emcc link step that produces a bare `.wasm` with no JS glue,
# which clashes with the `MODULARIZE`/`EXPORT_ES6` flags we pass for the
# bin target. The `prism_daemon_wasm` bin in `src/bin/` is the single
# emcc-link trigger and keeps the `#[no_mangle]` C ABI symbols alive
# through LTO via `black_box` references.
#
# `staticlib` is the mobile linkage path: iOS (aarch64-apple-ios,
# aarch64-apple-ios-sim) consumes `libprism_daemon.a` inside an
# xcframework wrapped by the Swift Capacitor plugin; Android
# (aarch64/armv7/x86_64-linux-android) links it into per-ABI `.so`
# shared objects via cargo-ndk for the Kotlin Capacitor plugin. Both
# call the C ABI in `src/wasm.rs` through `prism_daemon_{create,
# destroy,invoke,free_string}`. staticlib is a no-op on wasm32 and
# rlib-only targets, so it doesn't affect desktop or WASM builds.
crate-type = ["staticlib", "rlib"]

[[bin]]
name = "prism-daemond"
path = "src/bin/prism_daemond.rs"
required-features = ["cli"]

# Empty-main shim that exists only so `cargo build --target
# wasm32-unknown-emscripten --features wasm` produces a `.js` + `.wasm`
# pair (emscripten's linker requires a `main` symbol). The library's
# `#[no_mangle] extern "C"` surface in `src/wasm.rs` is what the browser
# actually calls via `Module.ccall`.
[[bin]]
name = "prism_daemon_wasm"
path = "src/bin/prism_daemon_wasm.rs"
required-features = ["wasm"]

# ── Features ──────────────────────────────────────────────────────────────
#
# The daemon is a composable kernel. Each capability is its own feature so
# mobile/embedded/WASM builds can opt out of what they can't (or don't
# want to) carry. `full` is the desktop default. Mobile shells typically
# pick `mobile` (drops process spawning + notify, keeps CRDT + Luau).
# Browser shells pick `wasm` (emscripten target, CRDT + Luau only, exposed
# through a C ABI adapter instead of Tauri IPC).

[features]
default = ["full"]

# Full desktop/server build — all modules + standalone CLI.
full = ["crdt", "luau", "build", "watcher", "vfs", "crypto", "cli"]

# Mobile build — no process spawning, no notify (iOS/Android prefer
# their own filesystem APIs). Still pulls in VFS (the app sandbox has
# plenty of filesystem access) and crypto (the whole point of mobile is
# encrypted sync with other devices).
mobile = ["crdt", "luau", "vfs", "crypto"]

# Embedded / minimum build — just CRDT. Intentionally stripped: no Luau,
# no filesystem modules, no crypto. This is what would run on a hypothetical
# no_std-leaning target (ESP32 simulators, microcontrollers with enough
# flash to hold loro). Keeping it minimal keeps the door open for real
# embedded work later without any existing dep leaking in.
embedded = ["crdt"]

# WebAssembly build — targets `wasm32-unknown-emscripten` (the only WASM
# triple mlua's vendored Luau supports). Pulls in everything the browser
# can actually run: CRDT + Luau + VFS (emscripten's MEMFS) + crypto.
# No `watcher` (no inotify/kqueue in the browser), no `build` (process
# spawning is a no-op on WASM), no `cli` (no stdio loop in a browser).
wasm = ["crdt", "luau", "vfs", "crypto"]

# Individual capabilities.
crdt = ["dep:loro"]
luau = ["dep:mlua"]
build = []
watcher = ["dep:notify"]
vfs = ["dep:sha2", "dep:hex"]
crypto = ["dep:chacha20poly1305", "dep:x25519-dalek", "dep:rand_core", "dep:hex"]
cli = ["dep:tokio"]

[dependencies]
# CRDT source of truth — pure Rust, works on every target.
loro = { version = "1.4", optional = true }

# Luau scripting — vendored for zero system deps (builds on iOS/Android).
mlua = { version = "0.10", features = ["luau", "vendored", "serialize"], optional = true }

# Serialization — always on; every module speaks JSON at the registry edge.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling.
thiserror = "2"

# Async runtime — only needed by the standalone CLI bin. Library code is
# intentionally sync so it can be embedded from any host runtime.
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "sync", "io-std", "io-util"], optional = true }

# File system watching — not available on every target (e.g. iOS).
notify = { version = "7", optional = true }

# VFS content-addressing — pure Rust SHA-256 + hex encoder. Tiny, no
# system deps, compiles clean on wasm32-unknown-emscripten and every
# mobile target.
sha2 = { version = "0.10", optional = true }
hex = { version = "0.4", optional = true }

# Crypto — pure Rust X25519 (ECDH) + XChaCha20-Poly1305 (AEAD) +
# cryptographically secure RNG trait. Matches the SPEC's E2EE layer
# (libsodium-equivalent primitives) without pulling in libsodium's C
# source, so mobile/wasm builds stay dependency-light. Works on every
# target we care about: desktop (arc4random/urandom), iOS/Android
# (arc4random_buf/getrandom), and wasm32-unknown-emscripten (emscripten's
# libc exposes a working getrandom backed by JavaScript's
# `crypto.getRandomValues`).
chacha20poly1305 = { version = "0.10", optional = true }
x25519-dalek = { version = "2", features = ["static_secrets"], optional = true }
rand_core = { version = "0.6", features = ["getrandom"], optional = true }

[dev-dependencies]
tempfile = "3"
serde_json = "1"
